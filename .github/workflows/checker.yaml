name: Production Deployment Validation Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify_and_lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Repository Workspace
        uses: actions/checkout@v4

      - name: Initialize Syntax Linters
        run: |
          sudo apt-get update
          sudo apt-get install -y jq yamllint

      - name: Validate Xray Configuration Structure (JSON)
        run: |
          echo "==== RUNNING REAL-TIME VALIDATION ON CONFIG.JSON ===="
          if ! jq . config.json > /dev/null 2>&1; then
            echo "::error::CRITICAL SYNTAX FAILURE FOUND IN config.json"
            echo "================ RAW CODE OVERVIEW ================"
            cat config.json
            echo "==================================================="
            exit 1
          fi
          echo "✅ config.json syntax structural integrity confirmed."

      - name: Validate Envoy Proxy Configuration (YAML)
        run: |
          echo "==== RUNNING REAL-TIME VALIDATION ON ENVOY.YAML ===="
          if ! yamllint -d "{extends: relaxed, rules: {line-length: disable}}" envoy.yaml; then
            echo "::error::CRITICAL LINTING/PARSING FAILURE FOUND IN envoy.yaml"
            echo "================ RAW CODE OVERVIEW ================"
            cat envoy.yaml
            echo "==================================================="
            exit 1
          fi
          echo "✅ envoy.yaml syntax structural integrity confirmed."

      - name: Authenticate to Google Cloud
        # This step handles secure deployment authentication if credentials are set
        if: github.event_name == 'push'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          bg_ready: true

      - name: Set up Cloud SDK Context
        if: github.event_name == 'push'
        uses: google-github-actions/setup-gcloud@v2

      - name: Execute Verified Deployment Run
        if: github.event_name == 'push'
        run: |
          chmod +x deploy.sh
          # Pass basic service defaults natively to bypass interactive blocking loops
          echo "envoy-vless" | ./deploy.sh
