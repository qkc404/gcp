static_resources:
  listeners:
  - name: ingress_listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          codec_type: AUTO
          route_config:
            name: local_route
            virtual_hosts:
            - name: local_service
              domains: ["*"]
              routes:
              # Health Validation Endpoint (Instant Direct Response)
              - match:
                  path: "/health"
                direct_response:
                  status: 200
                  body:
                    inline_string: "OK\n"
              # VLESS WebSocket Channel
              - match:
                  prefix: "/vless-saeka-ws"
                route:
                  cluster: xray_ws
                  timeout: 0s
                  idle_timeout: 0s
              # VLESS HTTPUpgrade Channel
              - match:
                  prefix: "/vless-saeka-hu"
                route:
                  cluster: xray_hu
                  timeout: 0s
                  idle_timeout: 0s
              # VLESS gRPC Multiplexing Path
              - match:
                  prefix: "/vless-saeka-grpc"
                route:
                  cluster: xray_grpc
                  timeout: 0s
                  idle_timeout: 0s
                  max_stream_duration:
                    grpc_max_stream_duration: 0s
              # VLESS xhttp Streaming Path
              - match:
                  prefix: "/vless-saeka-xhttp"
                route:
                  cluster: xray_xhttp
                  timeout: 0s
                  idle_timeout: 0s
              # Static Frontend Web Hub
              - match:
                  prefix: "/"
                route:
                  cluster: static_web
                  timeout: 10s
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          upgrade_configs:
          - upgrade_type: websocket
          - upgrade_type: httpupgrade
          - upgrade_type: xhttp
          # Performance-Tuned Connection Windows to Lower Latency & Buffer Bloat
          http2_protocol_options:
            max_concurrent_streams: 1000
            initial_stream_window_size: 6553600
            initial_connection_window_size: 10485760

  clusters:
  - name: xray_ws
    connect_timeout: 0.5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: xray_ws
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 10000

  - name: xray_hu
    connect_timeout: 0.5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: xray_hu
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 10001

  - name: xray_grpc
    connect_timeout: 0.5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options:
            max_concurrent_streams: 1000
            initial_stream_window_size: 6553600
            initial_connection_window_size: 10485760
    load_assignment:
      cluster_name: xray_grpc
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 10002

  - name: xray_xhttp
    connect_timeout: 0.5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: xray_xhttp
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 10003

  - name: static_web
    connect_timeout: 0.5s
    type: STRICT_DNS
    dns_lookup_family: V4_ONLY
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: static_web
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: 127.0.0.1
                port_value: 8081